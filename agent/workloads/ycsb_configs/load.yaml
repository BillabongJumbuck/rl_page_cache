# Database Parameters
database:
  key_size: 16
  value_size: 200
  nr_entry: 80000000

# Workload Parameters
workload:
  nr_warmup_op: 0
  warmup_runtime_seconds: 0
  runtime_seconds: 0
  nr_op: 80000000
  nr_thread: 8
  next_op_interval_ns: 0      # 补上，C++代码可能强依赖
  operation_proportion:
    read: 0
    update: 0
    insert: 1.0
    scan: 0
    read_modify_write: 0
  request_distribution: "zipfian"
  zipfian_constant: 0.99
  trace_file_list: []         # 补上空列表，防止 parser 找不到 key 报错
  scan_length: 100            # 补上，防止 parser 找不到 key 报错

# LevelDB Parameters
leveldb:
  data_dir: "/home/messidor/rl_page_cache/leveldb_data"
  options_file: ""            # 补上空字符串，防止强制读取报错
  cache_size: 16777216        # 极其漂亮的 16MB 极限压榨设计！
  print_stats: true